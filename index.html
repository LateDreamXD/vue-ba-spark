<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8" />
	<title>Vue BASpark</title>
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<meta name="robot" content="noindex, nofollow" />
	<style>
		body {
			margin: 0;
			padding: 0;
		}
		#bg {
			position: absolute;
			top: 0;
			left: 0;
			width: 100%;
			height: 100%;
			object-fit: cover;
			z-index: -1;
			filter: blur(10px) brightness(0.5);
			pointer-events: none;
		}
	</style>
</head>

<body>
	<img id="bg" src="https://assets.latedream.qzz.io/images/background.webp" alt="" />
	<div id="app"></div>
	<script type="module">
		import { createApp } from 'vue';
		import App from './src/BASpark.vue';
		createApp(App, { opts: { showFPS: true } }).mount('#app');
	</script>
</body>
</html>
